{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{%   block title %}  Mon Blog{%  endblock title %}</title>
    <style>
          body{
               font-family: sans-serif;
               margin: 20 px;
               background-color: #f4f4f4;
               color: #333;
        }
        nav {
            background-color: #333;
            padding: 10px;
            margin-botton: 20px;
        }
        nav a{
            color: white;
            margin-right: 15px;
            text-decoration: none;
        }
        .container{
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow:0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1, h2{
                color: #555;
        }
    </style>
</head>
<body>
     <nav>
        <a href="{%  url "blogapp:accueil" %}">Accueil</a>
        {%   if user.is_authenticated %}
        <a href="{%  url "blogapp:deconnexion" %}">Deconnexion</a>
        {%  else %}
        <a href="{%  url "blogapp:connexion" %}">Connexion</a>
        <a href="{%  url "blogapp:inscription" %}">Inscription</a>
        {%  endif %}
    
     </nav>



    <div class="container">

        {%   block content %}
        {%  endblock content %}

    <div>
</body>
</html>
